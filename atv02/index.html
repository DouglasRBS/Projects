<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade02</title>
</head>
<body>
    <form action="">
        <fieldset>
            <legend>Crie a sua conta</legend>

            <label for="nome">Nome:</label>
            <input type="text" id="name" name="name">
            <br><br>

            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email" placeholder="drei@gmail.com">
            <br><br>

            <label for="senha">Senha:</label>
            <input type="password" minlength="8" required>

            <h4>Gênero</h4>
            
            <p>Selecione o seu Gênero:</p>

            <input type="radio" id="masc" name="genero"  value="masculino" checked>
            <label for="masc">Masculino</label><br>

            <input type="radio"  id="fem" name="genero" value="feminino">
            <label for="fem">Feminino</label><br>

            <p>Sua Biografia:</p>
            <textarea name="Biografia" id="Biografia" rows="5" cols="33" placeholder="Conte mais sobre voce"></textarea>
            <br>

            <p>
            <input type="checkbox" id="termos" name="termos" required>
            <label for="termos">Eu concordo com os <a href="#">termos de uso</a>.</label>
            </p>

            <button type="submit">Enviar</button> <br>

            <img src="gengar-purple.gif" alt="gengar">

            
        </fieldset>
    </form>
</body>
</html>
